<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MITRE → Draw.io</title>
    <link rel="icon" href="./favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <h1>MITRE → Draw.io</h1>
        <p>
          Отметьте тактики и техники, затем скачайте готовый файл draw.io для
          диаграммы.
        </p>
      </div>
      <div class="header-actions">
        <button id="select-all-btn" type="button" class="secondary">
          Выбрать всё
        </button>
        <button id="clear-btn" type="button" class="secondary">Очистить</button>
      </div>
    </header>

    <main>
      <section class="controls">
        <div class="controls-left">
          <button id="generate-btn" type="button" disabled>
            MITRE draw.io
          </button>
          <button id="generate-fstec-btn" type="button" class="secondary" disabled>
            FSTEC draw.io
          </button>
          <span id="selection-counter">0 техник выбрано</span>
          <button id="preview-toggle-btn" type="button" class="secondary" style="margin-left: 10px;">Предпросмотр</button>
        </div>
        <button id="settings-toggle" type="button" class="secondary settings-toggle">
          Проекты и импорт
        </button>
      </section>

      <section id="settings-panel" class="settings-panel hidden">
        <div class="presets">
          <div class="preset-row">
            <label class="preset-select-label">
              Сохранённые проекты
              <select id="preset-select">
                <option value="">— не выбрано —</option>
              </select>
            </label>
            <button id="delete-preset-btn" type="button" class="secondary" disabled>
              Удалить
            </button>
          </div>
          <div class="preset-row">
            <input
              id="preset-name"
              type="text"
              placeholder="Название проекта"
              autocomplete="off"
            />
            <button id="save-preset-btn" type="button">Сохранить проект</button>
          </div>
        </div>

        <section class="import-drawio">
          <div class="preset-row">
            <label class="preset-select-label">
              Импорт из draw.io
              <input id="drawio-import" type="file" accept=".drawio,.xml" />
            </label>
            <button id="import-btn" type="button" class="secondary" disabled>
              Импортировать
            </button>
          </div>
          <p id="import-status" class="import-status"></p>
        </section>

        <section class="import-drawio text-import">
          <div class="preset-row" style="width: 100%;">
            <label class="preset-select-label" style="width: 100%;">
              Быстрый импорт техник (по одной на строку)
              <textarea id="text-import-textarea" rows="4" placeholder="T1003&#10;T1027&#10;T1003.008" style="font-family: monospace; resize: vertical; min-height: 90px; margin-top: 0.4rem;"></textarea>
            </label>
          </div>
          <div class="preset-row" style="margin-top: 0.5rem; display: flex; align-items: center; width: 100%;">
            <button id="text-import-btn" type="button">Импортировать список</button>
            <label class="checkbox-row" style="margin-left: 1rem; cursor: pointer;">
              <input id="text-import-clear-toggle" type="checkbox" />
              <span>Сбросить текущий выбор</span>
            </label>
          </div>
          <p id="text-import-status" class="import-status"></p>
        </section>

        <section class="green-filter">
          <label class="checkbox-row">
            <input id="green-filter-toggle" type="checkbox" />
            <span>Подсвечивать "зеленые" техники (PT NAD)</span>
          </label>
          <p class="filter-note">
            Источник списков: `pt_nad_green_techniques.txt` и
            `pt_nad_green_subtechniques.txt`.
          </p>
        </section>
      </section>

      <div class="tactics-toolbar">
        <div class="tactics-toolbar-actions">
          <button id="expand-all-tactics-btn" type="button" class="secondary small">
            Развернуть все
          </button>
          <button id="collapse-all-tactics-btn" type="button" class="secondary small">
            Свернуть все
          </button>
        </div>
        <nav id="tactics-tabbar" class="tactics-tabbar" aria-label="Быстрый переход по тактикам"></nav>
      </div>

      <div class="tactics-scroll-wrapper">
        <div class="tactics-scrollbar" id="tactics-scrollbar">
          <div class="tactics-scrollbar-inner" id="tactics-scrollbar-inner"></div>
        </div>
        <section id="tactics-container" class="tactics"></section>
      </div>
    </main>

    <template id="tactic-template">
      <div class="tactic">
        <div class="tactic-summary">
          <span class="tactic-title"></span>
          <button type="button" class="tactic-toggle" aria-label="Скрыть тактику">
            👁
          </button>
        </div>
        <div class="techniques"></div>
      </div>
    </template>

    <template id="technique-template">
      <div class="technique">
        <label class="technique-checkbox">
          <input type="checkbox" />
          <div class="technique-info">
            <div class="technique-title"></div>
            <div class="technique-name"></div>
          </div>
        </label>
        <a
          class="technique-link"
          href="#"
          title="Открыть описание техники"
          target="_blank"
          rel="noopener"
        >
          ↗
        </a>
        <button type="button" class="technique-select-all hidden">
          Все
        </button>
      </div>
    </template>

    <template id="subtech-template">
      <div class="subtechnique">
        <label class="subtech-checkbox">
          <input type="checkbox" />
          <div class="subtech-body">
            <div class="subtech-title"></div>
            <div class="subtech-name"></div>
          </div>
        </label>
        <a
          class="subtech-link"
          href="#"
          title="Открыть описание подпункта"
          target="_blank"
          rel="noopener"
        >
          ↗
        </a>
      </div>
    </template>

        <!-- Preview Window -->
    <section class="win95-window" id="preview-window" style="margin: 16px 0; display: none;">
      <div class="win95-title-bar">
        <div class="win95-title-text">
          <span class="win95-title-icon"></span>
          Предпросмотр схемы Draw.io (Интерактивная карта)
        </div>
        <div class="win95-title-controls">
          <button class="win95-title-btn min" aria-label="Minimize"></button>
          <button class="win95-title-btn max" aria-label="Maximize"></button>
          <button class="win95-title-btn close" id="preview-close-btn" aria-label="Close"></button>
        </div>
      </div>
      <div class="win95-menu-bar">
        <div class="win95-menu-item" id="preview-mode-mitre" style="font-weight: bold; cursor: pointer;">• MITRE Схема</div>
        <div class="win95-menu-item" id="preview-mode-fstec" style="cursor: pointer; margin-left: 10px;">• FSTEC Схема</div>
      </div>
      <div class="win95-window-body" style="padding: 4px;">
        <div id="preview-workspace" style="position: relative; background-color: #008080; overflow: auto; width: 100%; height: 500px; border: 2px solid #808080; box-shadow: inset 1px 1px 0px #000;">
          <!-- Absolutely positioned divs will be drawn here -->
        </div>
      </div>
    </section>

    <script src="translationData.js"></script>
    <script src="mitre_ru.js"></script>
    <script src="pt_nad_green_data.js"></script>

    <script src="src/config.js"></script>
    <script src="src/dom.js"></script>
    <script src="src/state.js"></script>
    <script src="src/utils.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/fstec.js"></script>
    <script src="src/layout.js"></script>
    <script src="src/drawioExport.js"></script>
    <script src="src/render.js"></script>
    <script src="src/selection.js"></script>
    <script src="src/preview.js"></script>
    <script src="src/presets.js"></script>
    <script src="src/import.js"></script>
    <script src="src/main.js"></script>
  </body>
</html>
